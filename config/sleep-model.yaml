subjects:
  prefix: "S"
  start: 2
  end: 103
  small_batch_test: false
  small_batch_limit: 35

dataset:
  block_duration_sec: 1800.0
  epoch_sec: 5.0
  horizon: 0
  drop_boundary: 5
  tail_policy: "drop"
  preload: false

split:
  leave_n_out_test: 2
  within_subject_ratio: [0.6, 0.2, 0.2]
  across_subject_ratio: [0.64, 0.16, 0.2]
  seed: 42
  subject_split_file: "../data/processed/splits/subject_split_seed{seed}_ratio_{ratio_tag}.json"

labels:
  stage_map:
    W: 0
    N1: 1
    N2: 2
    N3: 3
    R: 4

preprocessing:
  imputer:
    strategy: "constant"
    fill_value: 0.0
  scaler: "standard"

